        }

        body { background-color: var(--bg-app); transition: background-color 0.2s; }

        .theme-card       { background-color: var(--bg-card) !important; box-shadow: var(--shadow-lg); }
        .theme-header     { background-color: var(--bg-header) !important; box-shadow: var(--shadow-lg); }
        .theme-search     { background-color: var(--bg-search) !important; box-shadow: var(--shadow-lg); }
        .theme-input      { background-color: var(--bg-input) !important; border-color: var(--border-base) !important; color: var(--text-primary) !important; }

        .theme-text-primary   { color: var(--text-primary) !important; }
        .theme-text-secondary { color: var(--text-secondary) !important; }
        .theme-text-muted     { color: var(--text-muted) !important; }
        .theme-border     { border-color: var(--border-base) !important; }
        .theme-tag        { background-color: var(--bg-tag) !important; }

        :root.dark .dark-invert-indigo { background-color: #1e3a5f !important; border-color: #3b5998 !important; }
        :root.dark .dark-invert-gray   { background-color: #1e293b !important; border-color: #334155 !important; }

        :root.dark .dark-invert-blue   { background-color: #0c1a2e !important; border-color: #1e40af !important; }
        :root.dark .dark-invert-orange { background-color: #1c1108 !important; border-color: #9a3412 !important; }
        :root.dark .dark-invert-green  { background-color: #052e16 !important; border-color: #166534 !important; }

        :root.dark .dark-text-amber  { color: #fcd34d !important; }
        :root.dark .dark-text-indigo { color: #a5b4fc !important; }
        :root.dark .dark-text-blue   { color: #93c5fd !important; }
        :root.dark .dark-text-orange { color: #fdba74 !important; }

        /* Modal backdrop */
        body.modal-open { overflow: hidden; }

        /* Animations */
        @keyframes betaPulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.7; }
        }
        .beta-badge { animation: betaPulse 2.5s ease-in-out infinite; }

        @keyframes checkPop {
            0%   { transform: scale(0.8); }
            60%  { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .check-pop { animation: checkPop 0.25s ease-out; }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .slide-up { animation: slideUp 0.25s ease-out; }

        /* Toggle pill */
        .toggle-pill {
            display: inline-flex;
            align-items: center;
            background: var(--bg-tag);
            border: 1.5px solid var(--border-base);
            border-radius: 9999px;
            padding: 3px;
            gap: 2px;
        }
        .toggle-btn {
            border-radius: 9999px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.18s;
            border: none;
            color: var(--text-muted);
            background: transparent;
            letter-spacing: 0.03em;
        }
        .toggle-btn.active {
            background: #4f46e5;
            color: #fff;
            box-shadow: 0 1px 4px rgba(79,70,229,0.4);
        }

            { name:'Carbidopa/Levodopa', tradeName:'Sinemet, Duopa', drugClass:"Parkinson's", recommendation:'CONTINUE', timing:'Day of surgery', rationale:'CRITICAL — Do NOT discontinue. Abrupt withdrawal may trigger parkinsonian crisis or neuroleptic malignant syndrome (NMS). No IV formulation is available. Take the morning-of-surgery dose with a small sip of water. Resume oral therapy as soon as possible postoperatively — delayed resumption can cause severe immobility. If prolonged NPO is anticipated, coordinate with neurology for alternative management.', rationale_es:'CRÍTICO — NO suspender. La suspensión abrupta puede desencadenar una crisis parkinsoniana o síndrome neuroléptico maligno (SNM). No existe formulación IV. Tomar la dosis de la mañana de la cirugía con un pequeño sorbo de agua. Reanudar la terapia oral lo antes posible en el postoperatorio — la demora puede causar inmovilidad grave. Si se anticipa NPO prolongado, coordinar con neurología.' },
            { name:'Levodopa/Carbidopa', tradeName:'Sinemet, Duopa', drugClass:"Parkinson's", recommendation:'CONTINUE', timing:'Day of surgery', rationale:'CRITICAL — Do NOT discontinue. Abrupt withdrawal may trigger parkinsonian crisis or neuroleptic malignant syndrome (NMS). No IV formulation is available. Take the morning-of-surgery dose with a small sip of water. Resume oral therapy as soon as possible postoperatively.', rationale_es:'CRÍTICO — NO suspender. La suspensión abrupta puede desencadenar crisis parkinsoniana o SNM. No existe formulación IV. Tomar la dosis de la mañana de la cirugía con un pequeño sorbo de agua. Reanudar la terapia oral lo antes posible en el postoperatorio.' },
            { name:'Ropinirole', tradeName:'Requip, Requip XL', drugClass:"Parkinson's", recommendation:'CONTINUE', timing:'Day of surgery', rationale:'CRITICAL for Parkinson\'s disease — continue to prevent exacerbation and akinesia. Can be taken with a sip of water up to time of anesthetic induction.<br><br>⚠️ Caution: Ropinirole can increase the risk of hypotension when used with inhalational or intravenous anesthetics — anesthesia team should be aware.<br><br>Also used for Restless Legs Syndrome (RLS): continue through surgery to preserve symptom control. If prolonged NPO is anticipated postoperatively, contact the prescribing specialist for guidance on dose re-titration if therapy is interrupted for more than 24 hours.', rationale_es:'CRÍTICO para la enfermedad de Parkinson — continuar para prevenir exacerbación y acinesia. Se puede tomar con un sorbo de agua hasta la inducción anestésica.<br><br>⚠️ Precaución: Ropinirol puede aumentar el riesgo de hipotensión con anestésicos inhalados o intravenosos — informar al equipo de anestesia.<br><br>También se usa para el Síndrome de Piernas Inquietas: continuar para mantener el control de síntomas. Si se anticipa NPO prolongado, contactar al especialista prescriptor.' },
            { name:'Ropinirole (Restless Legs Syndrome)', tradeName:'Requip', drugClass:'Restless Legs Syndrome', recommendation:'CONTINUE', timing:'Day of surgery', rationale:'Continue to prevent loss of RLS symptom control. Can take with a sip of water up to anesthetic induction.<br><br>⚠️ Caution: Ropinirole can increase the risk of hypotension when combined with inhalational or intravenous anesthetics — inform the anesthesia team.<br><br>Note: If therapy is interrupted for more than a few days postoperatively, doses should be re-titrated per manufacturer guidance rather than resumed at the previous dose.', rationale_es:'Continuar para prevenir pérdida del control de síntomas del SPI. Se puede tomar con un sorbo de agua hasta la inducción anestésica.<br><br>⚠️ Precaución: Puede aumentar el riesgo de hipotensión con anestésicos — informar al equipo de anestesia.<br><br>Nota: Si la terapia se interrumpe más de unos días en el postoperatorio, las dosis deben re-titularse según indicaciones del fabricante.' },

            { name:'Nicotine patch (NRT)', tradeName:'Nicoderm CQ, Habitrol', drugClass:'Smoking Cessation', recommendation:'COORDINATE', timing:'Day of surgery', rationale:'Nicotine replacement therapy (NRT) is PREFERABLE to active smoking perioperatively. Current evidence does not show increased risk of inpatient mortality, readmission, or wound complications with NRT compared to continued smoking.<br><br>⚠️ Specialty-specific caution: Plastic and orthopedic surgeons may require complete nicotine abstinence (including NRT) before aesthetic, reconstructive, or orthopedic procedures due to concerns about bone healing, flap viability, and osseointegration. Confirm with your surgeon.<br><br>Goal: Encourage complete smoking cessation. If the patient cannot abstain entirely, NRT is safer than continued cigarette use. Ideally, smoking cessation should begin as early as possible before surgery.', rationale_es:'La terapia de reemplazo de nicotina (TRN) es PREFERIBLE al tabaquismo activo en el perioperatorio. La evidencia actual no muestra mayor riesgo de mortalidad hospitalaria, readmisión o complicaciones de heridas con TRN comparado con seguir fumando.<br><br>⚠️ Precaución específica por especialidad: Cirujanos plásticos y ortopédicos pueden requerir abstinencia total de nicotina (incluyendo TRN) antes de procedimientos estéticos, reconstructivos u ortopédicos. Confirme con su cirujano.<br><br>Meta: Fomentar el cese completo del tabaquismo. Si el paciente no puede abstenerse, la TRN es más segura que continuar fumando.' },

            { name:'Nicotine lozenge (NRT)', tradeName:'Nicorette Lozenge, Commit', drugClass:'Smoking Cessation', recommendation:'COORDINATE', timing:'Day of surgery', rationale:'Nicotine replacement therapy (NRT) is PREFERABLE to active smoking perioperatively.<br><br>⚠️ Specialty-specific caution: Plastic and orthopedic surgeons may require complete nicotine abstinence including NRT before certain procedures. Confirm with your surgeon.<br><br>Note: Avoid using lozenges in the immediate pre-operative NPO window.', rationale_es:'La TRN es PREFERABLE al tabaquismo activo en el perioperatorio.<br><br>⚠️ Precaución: Cirujanos plásticos y ortopédicos pueden requerir abstinencia total de nicotina. Confirme con su cirujano.<br><br>Nota: Evite usar las pastillas en la ventana NPO preoperatoria inmediata.' },

        ];

        // ── Helpers ──────────────────────────────────────────────────────────────
        function getTiming(med, lang) {
            if (lang === 'es') return TIMING_ES[med.timing] || med.timing;
            return med.timing;
        }
        function getRationale(med, lang) {
            if (lang === 'es' && med.rationale_es) return med.rationale_es;
            return med.rationale;
        }

        const getRecommendationColor = (r) => {
            switch (r) {
                case 'STOP': case 'COORDINATE STOP': return 'bg-red-100 text-red-800 border-red-300';
                case 'CONTINUE':                      return 'bg-green-100 text-green-800 border-green-300';
                case 'HOLD':                          return 'bg-orange-100 text-orange-800 border-orange-300';
                case 'ADJUST': case 'COORDINATE':     return 'bg-yellow-100 text-yellow-800 border-yellow-300';
                case 'CONTINUE + STRESS':             return 'bg-blue-100 text-blue-800 border-blue-300';
                default:                              return 'bg-gray-100 text-gray-800 border-gray-300';
            }
        };
        const getRecommendationIcon = (r) => {
            switch (r) {
                case 'STOP': case 'COORDINATE STOP': return '⛔';
                case 'CONTINUE':                      return '✅';
                case 'HOLD':                          return '⏸️';
                case 'ADJUST': case 'COORDINATE':     return '⚠️';
                case 'CONTINUE + STRESS':             return '💉';
                default:                              return 'ℹ️';
            }
        };

        // ── DisclaimerModal ──────────────────────────────────────────────────────

            const CheckRow = ({ id, checked, onChange, label }) => (

                            {checked && <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>}

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-3" style={{background:'rgba(15,23,42,0.85)',backdropFilter:'blur(4px)'}}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[95vh] flex flex-col overflow-hidden slide-up">
                        <div className="bg-gradient-to-r from-red-600 to-red-700 px-5 py-4 flex-shrink-0">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl">⚕️</div>
                                <div>
                                    <h2 className="text-white font-bold text-lg leading-tight">{t.disclaimerTitle}</h2>

                            <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-4 mb-5">
                                <div className="flex items-start gap-2">
                                    <span className="text-amber-600 text-lg flex-shrink-0">🧪</span>
                                    <div>
                                        <p className="font-bold text-amber-900 text-sm">{t.betaNoticeTitle}</p>
                                        <p className="text-amber-800 text-xs mt-1 leading-relaxed">{t.betaNoticeBody}</p>
                                    </div>
                                </div>
                            </div>
                            <p className="text-sm font-bold text-gray-800 mb-3 uppercase tracking-wide">{t.ackHeader}</p>
                            <div className="flex flex-col gap-3">
                                <CheckRow id="ack1" checked={c1} onChange={e=>setC1(e.target.checked)} label={t.ack1} />
                                <CheckRow id="ack2" checked={c2} onChange={e=>setC2(e.target.checked)} label={t.ack2} />

        // ── ReportErrorModal ─────────────────────────────────────────────────────
        function ReportErrorModal({ med, onClose, defaultTab, lang }) {
            const t = TR[lang];
            const [activeTab, setActiveTab] = useState(defaultTab || 'error');
            const [errorType, setErrorType] = useState('');
            const [errorDetails, setErrorDetails] = useState('');
            const [errorSubmitted, setErrorSubmitted] = useState(false);
            const [errorSubmitting, setErrorSubmitting] = useState(false);
            const [missingName, setMissingName] = useState('');
            const [missingTrade, setMissingTrade] = useState('');
            const [missingClass, setMissingClass] = useState('');
            const [missingRec, setMissingRec] = useState('');
            const [missingDetails, setMissingDetails] = useState('');
            const [missingSubmitted, setMissingSubmitted] = useState(false);
            const [missingSubmitting, setMissingSubmitting] = useState(false);
            const recOptions = ['CONTINUE', 'HOLD', 'STOP', 'ADJUST', 'COORDINATE', 'CONTINUE + STRESS', lang==='es'?'No estoy seguro':'Not sure'];

            const handleErrorSubmit = () => {
                if (!errorType) return;
                setErrorSubmitting(true);
                const subject = encodeURIComponent(`[PreOp Meds Beta] Error Report: ${med ? med.name : 'General'}`);
                const body = encodeURIComponent(`BETA ERROR REPORT — PreOp Medication Lookup\nDate: ${new Date().toLocaleString()}\n\nMedication: ${med?med.name:'N/A'}\nTrade Name: ${med?med.tradeName:'N/A'}\nDrug Class: ${med?med.drugClass:'N/A'}\nCurrent Recommendation: ${med?med.recommendation:'N/A'}\n\nError Type: ${errorType}\n\nDetails:\n${errorDetails||'(none provided)'}\n`);
                window.location.href = `mailto:bslmcanesthesia@gmail.com?subject=${subject}&body=${body}`;
                setTimeout(() => { setErrorSubmitting(false); setErrorSubmitted(true); }, 600);
            };
            const handleMissingSubmit = () => {
                if (!missingName.trim()) return;
                setMissingSubmitting(true);
                const subject = encodeURIComponent(`[PreOp Meds Beta] Missing Medication: ${missingName}`);
                const body = encodeURIComponent(`MISSING MEDICATION REPORT — PreOp Medication Lookup\nDate: ${new Date().toLocaleString()}\n\nMedication Name: ${missingName}\nTrade / Brand Name(s): ${missingTrade||'(not provided)'}\nDrug Class / Category: ${missingClass||'(not provided)'}\nSuggested Recommendation: ${missingRec||'(not provided)'}\n\nAdditional Details / References:\n${missingDetails||'(none provided)'}\n`);
                window.location.href = `mailto:bslmcanesthesia@gmail.com?subject=${subject}&body=${body}`;
                setTimeout(() => { setMissingSubmitting(false); setMissingSubmitted(true); }, 600);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-4" style={{background:'rgba(15,23,42,0.7)',backdropFilter:'blur(3px)'}}>
                    <div className="theme-card w-full md:max-w-md rounded-t-3xl md:rounded-2xl shadow-2xl overflow-hidden slide-up flex flex-col max-h-[92vh]">
                        <div className="bg-gradient-to-r from-orange-500 to-red-500 px-5 py-4 flex items-center justify-between flex-shrink-0">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">🚩</span>
                                <div>
                                    <h3 className="text-white font-bold">{t.submitFeedback}</h3>
                                    {med && activeTab==='error' && <p className="text-orange-100 text-xs truncate max-w-[200px]">{med.name}</p>}
                                </div>
                            </div>
                            <button onClick={onClose} className="text-white/70 hover:text-white text-2xl leading-none">&times;</button>
                        </div>
                        <div className="flex theme-border" style={{borderBottom:'1px solid var(--border-base)'}}>
                            <button onClick={()=>setActiveTab('error')} className={`flex-1 py-3 text-sm font-semibold transition-all flex items-center justify-center gap-1.5 ${activeTab==='error'?'text-orange-600 border-b-2 border-orange-500':'theme-text-secondary hover:theme-text-primary'}`}>{t.reportErrorTab}</button>
                            <button onClick={()=>setActiveTab('missing')} className={`flex-1 py-3 text-sm font-semibold transition-all flex items-center justify-center gap-1.5 ${activeTab==='missing'?'text-indigo-600 border-b-2 border-indigo-500':'theme-text-secondary hover:theme-text-primary'}`}>{t.missingMedTab}</button>
                        </div>
                        <div className="overflow-y-auto flex-1 p-5">
                            {activeTab==='error' && (
                                errorSubmitted ? (
                                    <div className="text-center py-6">
                                        <div className="text-5xl mb-3">✅</div>
                                        <p className="font-bold theme-text-primary text-lg mb-1">{t.thankYou}</p>
                                        <p className="theme-text-secondary text-sm mb-4">{t.errorThanksBody}</p>
                                        <button onClick={onClose} className="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-indigo-700">{t.close}</button>
                                    </div>
                                ) : (
                                    <>
                                        {med && (
                                            <div className="theme-tag rounded-xl p-3 mb-4 theme-border" style={{border:'1px solid var(--border-base)'}}>
                                                <p className="text-xs theme-text-muted uppercase tracking-wide font-semibold mb-1">{t.reportingFor}</p>
                                                <p className="font-bold theme-text-primary">{med.name}</p>
                                                {med.tradeName && <p className="theme-text-secondary text-sm">({med.tradeName})</p>}
                                                <p className="theme-text-muted text-xs mt-1">{med.drugClass} · {med.recommendation}</p>
                                            </div>
                                        )}
                                        <p className="text-sm font-semibold theme-text-primary mb-2">{t.errorTypeLabel} <span className="text-red-500">{t.required}</span></p>
                                        <div className="flex flex-col gap-2 mb-4">
                                            {t.errorTypes.map(type => (
                                                <label key={type} className={`flex items-center gap-2.5 p-2.5 rounded-lg border cursor-pointer transition-all ${errorType===type?'border-orange-400 bg-orange-50':'theme-border theme-tag'}`}>
                                                    <input type="radio" name="errorType" value={type} checked={errorType===type} onChange={()=>setErrorType(type)} className="accent-orange-500" />
                                                    <span className="text-sm theme-text-primary">{type}</span>
                                                </label>
                                            ))}
                                        </div>
                                        <p className="text-sm font-semibold theme-text-primary mb-2">{t.detailsOptional} <span className="theme-text-muted font-normal">{t.optional}</span></p>
                                        <textarea value={errorDetails} onChange={e=>setErrorDetails(e.target.value)} rows={3} className="theme-input w-full border-2 rounded-xl p-3 text-sm outline-none resize-none" style={{fontSize:'16px'}} />
                                        <p className="text-xs theme-text-muted mt-2 mb-4">{t.emailNote}</p>
                                        <button onClick={handleErrorSubmit} disabled={!errorType||errorSubmitting} className={`w-full py-3.5 rounded-xl font-bold text-sm transition-all ${errorType&&!errorSubmitting?'bg-orange-500 hover:bg-orange-600 text-white shadow-md cursor-pointer':'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                            {errorSubmitting ? t.openingEmail : t.submitErrorBtn}
                                        </button>
                                    </>
                                )
                            )}
                            {activeTab==='missing' && (
                                missingSubmitted ? (
                                    <div className="text-center py-6">
                                        <div className="text-5xl mb-3">✅</div>
                                        <p className="font-bold theme-text-primary text-lg mb-1">{t.thankYou}</p>
                                        <p className="theme-text-secondary text-sm mb-4">{t.missingThanksBody}</p>
                                        <button onClick={onClose} className="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-indigo-700">{t.close}</button>
                                    </div>
                                ) : (
                                    <>
                                        <div className="bg-indigo-50 dark-invert-indigo border border-indigo-200 rounded-xl p-3 mb-4">
                                            <p className="text-xs text-indigo-800 dark-text-indigo leading-relaxed"><strong>{t.missingIntro.split('?')[0]}?</strong>{t.missingIntro.split('?')[1]}</p>
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <div>
                                                <label className="block text-sm font-semibold theme-text-primary mb-1">{t.genericName} <span className="text-red-500">*</span></label>
                                                <input type="text" value={missingName} onChange={e=>setMissingName(e.target.value)} placeholder={t.genericPlaceholder} className="theme-input w-full border-2 rounded-xl px-3 py-2.5 text-sm outline-none" style={{fontSize:'16px'}} />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold theme-text-primary mb-1">{t.tradeName} <span className="theme-text-muted font-normal">{t.optional}</span></label>
                                                <input type="text" value={missingTrade} onChange={e=>setMissingTrade(e.target.value)} placeholder={t.tradePlaceholder} className="theme-input w-full border-2 rounded-xl px-3 py-2.5 text-sm outline-none" style={{fontSize:'16px'}} />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold theme-text-primary mb-1">{t.drugClassLabel} <span className="theme-text-muted font-normal">{t.optional}</span></label>
                                                <input type="text" value={missingClass} onChange={e=>setMissingClass(e.target.value)} placeholder={t.classPlaceholder} className="theme-input w-full border-2 rounded-xl px-3 py-2.5 text-sm outline-none" style={{fontSize:'16px'}} />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold theme-text-primary mb-1">{t.suggestedRec} <span className="theme-text-muted font-normal">{t.optional}</span></label>
                                                <div className="flex flex-wrap gap-2">
                                                    {recOptions.map(r => (
                                                        <button key={r} onClick={()=>setMissingRec(missingRec===r?'':r)} className={`px-3 py-1.5 rounded-lg text-xs font-semibold border-2 transition-all ${missingRec===r?'bg-indigo-600 text-white border-indigo-600':'theme-tag theme-text-secondary theme-border'}`}>{r}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold theme-text-primary mb-1">{t.additionalDetails} <span className="theme-text-muted font-normal">{t.optional}</span></label>
                                                <textarea value={missingDetails} onChange={e=>setMissingDetails(e.target.value)} placeholder={t.detailsPlaceholder} rows={3} className="theme-input w-full border-2 rounded-xl p-3 text-sm outline-none resize-none" style={{fontSize:'16px'}} />
                                            </div>
                                        </div>
                                        <p className="text-xs theme-text-muted mt-3 mb-4">{t.emailNote}</p>
                                        <button onClick={handleMissingSubmit} disabled={!missingName.trim()||missingSubmitting} className={`w-full py-3.5 rounded-xl font-bold text-sm transition-all ${missingName.trim()&&!missingSubmitting?'bg-indigo-600 hover:bg-indigo-700 text-white shadow-md cursor-pointer':'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                            {missingSubmitting ? t.openingEmail : t.submitMissingBtn}
                                        </button>
                                    </>
                                )
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ── Main App ─────────────────────────────────────────────────────────────
        function MedicationLookupApp() {
            const [disclaimerAccepted, setDisclaimerAccepted] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedMed, setSelectedMed] = useState(null);
            const [filterClass, setFilterClass] = useState('All');
            const [reportMed, setReportMed] = useState(null);
            const [lang, setLang] = useState('en');
            const [theme, setTheme] = useState('light');

            const t = TR[lang];

            // Apply theme to :root
            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [theme]);

            const drugClasses = useMemo(() => {
                const classes = [...new Set(medications.map(m => m.drugClass))];
                return ['All', ...classes.sort()];
            }, []);

            const filteredMeds = useMemo(() => {
                let results = medications;
                if (filterClass !== 'All') results = results.filter(m => m.drugClass === filterClass);
                if (searchTerm.trim()) {
                    const term = searchTerm.toLowerCase();
                    results = results.filter(m =>
                        m.name.toLowerCase().includes(term) ||
                        m.tradeName.toLowerCase().includes(term)
                    );
                }
                return results;
            }, [searchTerm, filterClass]);

            return (
                <>
                    {!disclaimerAccepted && (
                        <DisclaimerModal onAccept={() => setDisclaimerAccepted(true)} lang={lang} />
                    )}
                    {reportMed !== null && (
                        <ReportErrorModal
                            med={typeof reportMed === 'object' && reportMed !== false ? reportMed : null}
                            defaultTab={reportMed === 'missing' ? 'missing' : 'error'}
                            onClose={() => setReportMed(null)}
                            lang={lang}
                        />
                    )}

                    <div className="min-h-screen pb-24" style={{background:'var(--bg-app)'}}>
                        <div className="max-w-6xl mx-auto">

                            {/* Header */}
                            <div className="theme-header p-4 md:p-6 mb-2 md:mb-6 md:rounded-lg">
                                <div className="flex items-start justify-between gap-3 mb-2">
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-center gap-2 flex-wrap">
                                            <h1 className="text-xl md:text-3xl font-bold theme-text-primary">{t.appTitle}</h1>
                                            <span className="beta-badge inline-flex items-center gap-1 bg-amber-100 text-amber-800 border border-amber-300 text-xs font-bold px-2.5 py-1 rounded-full uppercase tracking-wide">🧪 {t.betaLabel}</span>
                                        </div>
                                        <p className="text-sm md:text-base theme-text-secondary mt-1">{t.appSubtitle}</p>
                                    </div>

                                    {/* Controls: theme + language */}
                                    <div className="flex flex-col gap-2 items-end flex-shrink-0">
                                        {/* Theme toggle */}
                                        <div className="toggle-pill">
                                            <button
                                                className={`toggle-btn ${theme==='light'?'active':''}`}
                                                onClick={() => setTheme('light')}
                                                title="Light mode"
                                            >☀️</button>
                                            <button
                                                className={`toggle-btn ${theme==='dark'?'active':''}`}
                                                onClick={() => setTheme('dark')}
                                                title="Dark mode"
                                            >🌙</button>
                                        </div>
                                        {/* Language toggle */}
                                        <div className="toggle-pill">
                                            <button
                                                className={`toggle-btn ${lang==='en'?'active':''}`}
                                                onClick={() => { setLang('en'); setFilterClass('All'); }}
                                            >EN</button>
                                            <button
                                                className={`toggle-btn ${lang==='es'?'active':''}`}
                                                onClick={() => { setLang('es'); setFilterClass('All'); }}
                                            >ES</button>
                                        </div>
                                    </div>
                                </div>

                                {/* Beta strip */}
                                <div className="mt-3 bg-amber-50 dark-invert-amber border border-amber-200 rounded-lg px-4 py-2.5 flex items-start gap-2">
                                    <span className="text-amber-500 text-sm flex-shrink-0 mt-0.5">⚠️</span>
                                    <p className="text-xs text-amber-800 dark-text-amber leading-relaxed">
                                        <strong>{t.betaWarning}</strong> <span className="font-semibold">{t.bestJudgment}</span> (02/26)
                                    </p>
                                </div>
                            </div>

                            {/* Search & Filter — Sticky */}
                            <div className="theme-search p-3 md:p-6 mb-2 md:mb-6 md:rounded-lg sticky top-0 z-10">
                                <div className="grid gap-3">
                                    <div>
                                        <label className="block text-sm font-medium theme-text-secondary mb-2">{t.searchLabel}</label>
                                        <input
                                            type="search"
                                            inputMode="search"
                                            placeholder={t.searchPlaceholder}
                                            value={searchTerm}
                                            onChange={e => setSearchTerm(e.target.value)}
                                            className="theme-input w-full px-4 py-4 md:py-3 border-2 rounded-lg text-base md:text-lg"
                                            style={{fontSize:'16px'}}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium theme-text-secondary mb-2">{t.filterLabel}</label>
                                        <select
                                            value={filterClass}
                                            onChange={e => setFilterClass(e.target.value)}
                                            className="theme-input w-full px-4 py-4 md:py-3 border-2 rounded-lg text-base md:text-lg"
                                            style={{fontSize:'16px'}}
                                        >
                                            {drugClasses.map(cls => <option key={cls} value={cls}>{cls}</option>)}
                                        </select>
                                    </div>
                                </div>
                                {searchTerm && (
                                    <p className="mt-3 text-sm font-medium theme-text-secondary theme-tag px-3 py-2 rounded-lg">
                                        {t.foundCount(filteredMeds.length)}
                                    </p>
                                )}
                            </div>

                            {/* Results */}
                            <div className="px-2 md:px-0">
                                {filteredMeds.length === 0 ? (
                                    <div className="theme-card rounded-lg p-8 md:p-12 text-center">
                                        <div className="text-6xl mb-4">🔍</div>
                                        <p className="text-lg md:text-xl theme-text-secondary mb-2 font-semibold">{t.noFound}</p>
                                        <p className="text-sm md:text-base theme-text-muted">{t.noFoundSub}</p>
                                    </div>
                                ) : (
                                    <div className="grid gap-3 md:gap-4">
                                        {filteredMeds.map((med, idx) => {
                                            const isOpen = selectedMed?.name === med.name && selectedMed?.drugClass === med.drugClass;
                                            return (
                                                <div key={idx} className="theme-card border-2 theme-border rounded-lg cursor-pointer hover:shadow-lg hover:border-indigo-400 transition-all duration-200 active:scale-[0.99] select-none overflow-hidden" style={{touchAction:'manipulation'}}>
                                                    <div className="p-4 md:p-5" onClick={() => setSelectedMed(isOpen ? null : med)}>
                                                        <div className="flex items-start gap-3 md:gap-4">
                                                            <div className="flex-1 min-w-0">
                                                                <h3 className="text-lg md:text-xl font-bold theme-text-primary break-words">{med.name}</h3>
                                                                {med.tradeName && <p className="text-sm md:text-base theme-text-secondary mt-1 break-words">({med.tradeName})</p>}
                                                                <p className="text-xs md:text-sm theme-text-muted mt-2 font-medium">{med.drugClass}</p>
                                                                {!isOpen && (
                                                                    <p className="text-xs text-indigo-500 font-semibold mt-1.5 flex items-center gap-1">
                                                                        <span>👆</span> {t.tapForDetails}
                                                                    </p>
                                                                )}
                                                            </div>
                                                            <div className={`px-3 py-2 md:px-4 md:py-3 rounded-lg font-bold text-sm md:text-base border-2 ${getRecommendationColor(med.recommendation)} flex-shrink-0 min-w-[90px] md:min-w-[110px] text-center`}>
                                                                <div className="flex flex-col items-center gap-1">
                                                                    <div className="text-lg md:text-xl">{getRecommendationIcon(med.recommendation)}</div>
                                                                    <div className="text-xs md:text-sm leading-tight">{med.recommendation}</div>
                                                                    <div className="text-[10px] md:text-xs font-semibold mt-0.5 px-1.5 py-0.5 rounded-full bg-white/50 text-current">
                                                                        {isOpen ? t.hideBtn : t.detailsBtn}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {isOpen && (
                                                        <div className="px-4 pb-4 md:px-5 md:pb-5 pt-4" style={{borderTop:'2px solid var(--border-base)'}}>
                                                            <div className="grid gap-3">
                                                                <div className="bg-indigo-50 dark-invert-indigo p-4 rounded-lg border border-indigo-200">
                                                                    <p className="text-xs md:text-sm font-bold text-indigo-900 dark-text-indigo mb-2 uppercase tracking-wide">{t.timingLabel}</p>
                                                                    <p className="text-base md:text-lg text-indigo-800 dark-text-indigo font-semibold">{getTiming(med, lang)}</p>
                                                                </div>
                                                                <div className="theme-tag p-4 rounded-lg theme-border" style={{border:'1px solid var(--border-base)'}}>
                                                                    <p className="text-xs md:text-sm font-bold theme-text-primary mb-2 uppercase tracking-wide">{t.rationaleLabel}</p>
                                                                    <p className="text-sm md:text-base theme-text-secondary leading-relaxed" dangerouslySetInnerHTML={{__html: getRationale(med, lang)}}></p>
                                                                </div>
                                                            </div>
                                                            <div className="mt-3 bg-blue-50 dark-invert-blue border border-blue-200 rounded-lg p-3">
                                                                <p className="text-sm text-blue-900 dark-text-blue">{t.importantNote}</p>
                                                            </div>
                                                            <button
                                                                onClick={e => { e.stopPropagation(); setReportMed(med); }}
                                                                className="mt-3 w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg border-2 border-orange-200 bg-orange-50 dark-invert-orange text-orange-700 dark-text-orange hover:bg-orange-100 transition-all text-sm font-semibold"
                                                            >
                                                                {t.reportBtn}
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>

                            {/* Footer */}
                            <div className="mt-8 text-center text-sm theme-text-muted px-4">
                                <p>{t.footerText}</p>
                                <p className="mt-1">{t.lastUpdated}</p>
                            </div>
                        </div>
                    </div>

                    {/* Floating action buttons */}
                    <div className="fixed bottom-5 right-4 z-40 flex flex-col gap-2 items-end">
                        <button
                            onClick={() => setReportMed('missing')}
                            className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-full shadow-xl font-semibold text-sm flex items-center gap-2 transition-all hover:scale-105 active:scale-95"
                        >
                            {t.missingFab}
                        </button>
                        <button
                            onClick={() => setReportMed(false)}
                            className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2.5 rounded-full shadow-xl font-semibold text-sm flex items-center gap-2 transition-all hover:scale-105 active:scale-95"
                        >
                            {t.reportFab}
                        </button>
                    </div>
                </>
            );
        }

        ReactDOM.render(<MedicationLookupApp />, document.getElementById('root'));

        // PWA — Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').catch(() => {});
            });
        }

        // PWA Install Prompt
        let deferredPrompt;
        const installButton = document.createElement('button');
        installButton.textContent = '📱 Install App';
        installButton.className = 'fixed bottom-4 left-4 bg-indigo-600 text-white px-6 py-3 rounded-full shadow-lg hover:bg-indigo-700 transition-all duration-200 font-semibold z-50';
        installButton.style.display = 'none';

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installButton.style.display = 'block';
            document.body.appendChild(installButton);
        });

        installButton.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                installButton.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            installButton.style.display = 'none';
        });
    </script>
</body>
</html>
